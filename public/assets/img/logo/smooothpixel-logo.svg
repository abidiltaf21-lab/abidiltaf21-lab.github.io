<svg width="400" height="100" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Barlow', sans-serif;">
    <defs>
        <filter id="pixelDropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#CF622D" flood-opacity="0.25"/>
        </filter>
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F18944" />
            <stop offset="100%" stop-color="#CF622D" />
        </linearGradient>
    </defs>
    
    <g filter="url(#pixelDropShadow)" transform="translate(10, -5) scale(0.8)">
        <!-- Y=0 -->
        <rect x="100" y="0" width="10.5" height="10.5" rx="3" fill="#FAD3A7" />
        <rect x="112.5" y="0" width="10.5" height="10.5" rx="3" fill="#FDF3E3" />
        
        <!-- Y=1 -->
        <rect x="87.5" y="12.5" width="10.5" height="10.5" rx="3" fill="#F6AD75" />
        <rect x="100" y="12.5" width="10.5" height="10.5" rx="3" fill="#FAD3A7" />
        <rect x="112.5" y="12.5" width="10.5" height="10.5" rx="3" fill="#FDF3E3" />

        <!-- Y=2 -->
        <rect x="75" y="25" width="10.5" height="10.5" rx="3" fill="#F18944" />
        <rect x="87.5" y="25" width="10.5" height="10.5" rx="3" fill="#F6AD75" />
        <rect x="112.5" y="25" width="10.5" height="10.5" rx="3" fill="#FDF3E3" />

        <!-- Y=3 -->
        <rect x="62.5" y="37.5" width="10.5" height="10.5" rx="3" fill="#CF622D" />
        <rect x="75" y="37.5" width="10.5" height="10.5" rx="3" fill="#F18944" />
        <rect x="87.5" y="37.5" width="10.5" height="10.5" rx="3" fill="#F6AD75" />
        <rect x="112.5" y="37.5" width="10.5" height="10.5" rx="3" fill="#FAD3A7" />
        <rect x="125" y="37.5" width="10.5" height="10.5" rx="3" fill="#F18944" />

        <!-- Y=4 -->
        <rect x="0" y="50" width="10.5" height="10.5" rx="3" fill="#F18944" />
        <rect x="25" y="50" width="10.5" height="10.5" rx="3" fill="#F18944" />
        <rect x="37.5" y="50" width="10.5" height="10.5" rx="3" fill="#F6AD75" />
        <rect x="50" y="50" width="10.5" height="10.5" rx="3" fill="#FAD3A7" />
        <rect x="62.5" y="50" width="10.5" height="10.5" rx="3" fill="#CF622D" />

        <!-- Y=5 -->
        <rect x="12.5" y="62.5" width="10.5" height="10.5" rx="3" fill="#F18944" />
        <rect x="25" y="62.5" width="10.5" height="10.5" rx="3" fill="#CF622D" />
        <rect x="37.5" y="62.5" width="10.5" height="10.5" rx="3" fill="#F6AD75" />
        <rect x="50" y="62.5" width="10.5" height="10.5" rx="3" fill="#FAD3A7" />
        <rect x="62.5" y="62.5" width="10.5" height="10.5" rx="3" fill="#F18944" />

        <!-- Y=6 -->
        <rect x="25" y="75" width="10.5" height="10.5" rx="3" fill="#F18944" />
        <rect x="37.5" y="75" width="10.5" height="10.5" rx="3" fill="#F18944" />
        <rect x="50" y="75" width="10.5" height="10.5" rx="3" fill="#CF622D" />

        <!-- Y=7 -->
        <rect x="37.5" y="87.5" width="10.5" height="10.5" rx="3" fill="#F18944" />
        <rect x="50" y="87.5" width="10.5" height="10.5" rx="3" fill="#F18944" />
    </g>

    <text x="130" y="50" font-size="36" font-weight="800" fill="#04000b" letter-spacing="-0.5">
        Smoooth<tspan fill="url(#textGrad)">Pixel</tspan>
    </text>
</svg>
