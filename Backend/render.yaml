services:
  # ── Main API Web Service ────────────────────────────────────────────────────────────────
  - type: web
    name: smooothpixel-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # generateValue: true makes Render create a strong random secret at first deploy
      # and store it securely. The value is never committed to git.
      - key: JWT_KEY
        generateValue: true
      - key: JWT_ISSUER
        value: SmooothPixel
      - key: JWT_AUDIENCE
        value: SmooothPixelClients
      - key: JWT_SUBJECT
        value: SmooothPixelAuth
      # Cloudinary — used by the backend for signed uploads and Media Library auth.
      # Set these in Render's Environment tab before deploying.
      - key: Cloudinary__CloudName
        value: ddxrpqctk
      - key: Cloudinary__ApiKey
        value: 963385473771588
      - key: Cloudinary__ApiSecret
        sync: false
      - key: Cloudinary__UploadPreset
        value: smooothpixel_upload
      - key: Cloudinary__Folder
        value: smooothpixel
      - key: DATABASE_URL
        fromDatabase:
          name: smooothpixel-db
          property: connectionString

  # ── Keep-Alive Cron Job ────────────────────────────────────────────────────────────────
  # دا cron job هر ۱۰ دقیقو کی سرور ته ping کوي چی Render Free Plan کی بیده نه شي.
  # د Cold Start ستونزه له مینځه وړي.
  - type: cron
    name: keep-alive-ping
    env: native
    plan: free
    schedule: "*/10 * * * *"
    startCommand: "curl -fs https://smooothpixel-api.onrender.com/api/health || true"

databases:
  - name: smooothpixel-db
    databaseName: reactapi
    user: reactapi
    plan: free
